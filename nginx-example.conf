# Example nginx config for wol-interceptor.
#
# This setup uses two pieces:
#   1. A dedicated subdomain for the interceptor (e.g. wake.example.com)
#      that *always* proxies to the wol-interceptor process.
#   2. On each origin site, when the upstream is unreachable nginx 302s the
#      visitor to the wake subdomain with ?from=<origin-host>. The wake
#      page polls /status and, once the origin comes back, redirects the
#      browser back to https://<origin-host>/.
#
# Why a separate subdomain:
#   If the wake page lived on the same hostname as the origin, polling
#   /status would start hitting the origin the moment it woke up (returning
#   non-JSON HTML), breaking the page. A dedicated subdomain keeps the
#   wake page's polling stable regardless of origin state.

upstream wol_interceptor {
    # Host running the interceptor (pm2). Same broadcast domain as the
    # WoL target.
    server 192.168.1.149:9494;
}

upstream origin {
    server 10.0.0.20:443 max_fails=1 fail_timeout=2s;
}

# 1. The wake subdomain — always serves the interceptor.
server {
    listen 443 ssl http2;
    server_name wake.example.com;

    # ssl_certificate / ssl_certificate_key — wildcard cert recommended.

    location / {
        proxy_pass http://wol_interceptor;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The wake page must always reflect current origin state.
        add_header Cache-Control "no-store" always;
    }

    # /auth/callback is the OIDC redirect URI registered with the IdP.
    # No extra location block is needed — it proxies through "/" above —
    # but be sure to register exactly the public URL here, e.g.
    # https://wake.example.com/auth/callback.
}

# 2. Origin site — proxies to the real backend, falls back via 302 redirect
#    to the wake subdomain when the backend is unreachable.
server {
    listen 443 ssl http2;
    server_name example.com;

    # ssl_certificate / ssl_certificate_key — keep your existing cert directives.

    client_max_body_size 0;

    # Short connect timeout so the fallback kicks in fast when the origin is off.
    proxy_connect_timeout 3s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    proxy_ssl_verify off;
    proxy_ssl_server_name on;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $http_connection;

    location / {
        proxy_pass https://origin;

        proxy_intercept_errors on;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        error_page 502 503 504 = @wake;
    }

    location @wake {
        # Redirect the user to the wake subdomain, telling it where to
        # send them back to once the origin is awake.
        return 302 https://wake.example.com/?from=$host;
    }
}
