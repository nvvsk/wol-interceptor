# Example nginx site config for wol-interceptor.
# Replace the existing `location /` (or proxy_pass block) of your site with
# this pattern.
#
# How it works:
#   - When the origin is awake, nginx proxies straight to it — zero overhead;
#     the interceptor is not on the request path.
#   - When the origin is asleep / unreachable, the connect or read times out,
#     nginx fires error_page, and the interceptor on 127.0.0.1:9494 serves a
#     wake page. The page polls /status; once the origin answers it reloads
#     the same URL, which now succeeds against the real upstream.

upstream origin {
    # Replace with your origin's IP/port.
    server 10.0.0.20:443 max_fails=1 fail_timeout=2s;
}

upstream wol_interceptor {
    # Where the interceptor process is running. Localhost when nginx and the
    # interceptor are on the same host.
    server 127.0.0.1:9494;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # ssl_certificate / ssl_certificate_key — keep your existing cert directives.

    # Allow large uploads (file sync, media, etc.). Tune to taste.
    client_max_body_size 0;

    # Short connect timeout so the fallback kicks in fast when the origin is off.
    proxy_connect_timeout 3s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # If the origin uses a self-signed cert, skip verification.
    proxy_ssl_verify off;
    proxy_ssl_server_name on;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $http_connection;

    location / {
        proxy_pass https://origin;

        proxy_intercept_errors on;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        error_page 502 503 504 = @wake;
    }

    location @wake {
        # Don't cache the wake page — once the origin is up we want fresh routing.
        add_header Cache-Control "no-store" always;
        proxy_pass http://wol_interceptor;
    }
}

# Optional: WebSocket / Connection map at http {} level if you don't already have one.
# map $http_upgrade $http_connection {
#     default upgrade;
#     ''      close;
# }
